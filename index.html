     Estrategia: deja que app.min.js renderice el módulo normalmente.
     Cuando el usuario hace clic en una de las 4 tabs modificadas, intercepta
     el clic y monta el contenido nuevo encima del contenedor activo.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
(() => {
  'use strict';

  const NS = '[Produccion-Patch v2]';
  const log  = (...a) => console.log(NS, ...a);
  const warn = (...a) => console.warn(NS, ...a);

  // ═══════════════════════════════════════════════════════════════════
  // 1. ESTADO Y CONFIGURACIÓN
  // ═══════════════════════════════════════════════════════════════════
  const State = {
    activeTab: null,           // tab interceptada actualmente activa
    semMode: 'current',        // current | range
    semDesde: '',
    semHasta: '',
    repMode: 'all',            // all | range
    repDesde: '',
    repHasta: '',
    editClienteIdx: -1,        // índice editando en Clientes en proceso
    chartTurnoMaquina: null,   // instancia Chart.js del gráfico nuevo
    moduleVisible: false,      // si el módulo Producción está visible
  };

  if (!window.PROD_DATA) {
    window.PROD_DATA = { corte: [], armado: [], clientes: [], rpt: [] };
  }

  // ═══════════════════════════════════════════════════════════════════
  // 2. HELPERS
  // ═══════════════════════════════════════════════════════════════════
  function prodToISO(f)   { if(!f) return ''; const p = String(f).split('/'); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : f; }
  function prodFromISO(f) { if(!f) return ''; const p = String(f).split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : f; }
  function prodDisp(f)    { if(!f) return '—'; const p = String(f).split('/'); return p.length===3 ? `${p[0]}/${p[1]}/${p[2].slice(2)}` : f; }
  function todayISO()     { return new Date().toISOString().split('T')[0]; }
  function escapeHTML(s)  { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function saveData() {
    try { localStorage.setItem('prod_v1', JSON.stringify(window.PROD_DATA)); }
    catch (e) { warn('localStorage save fail', e); }
    if (typeof window._fbSave === 'function') {
      try {
        const result = window._fbSave('produccion', window.PROD_DATA);
        if (result && typeof result.catch === 'function') {
          result.catch(e => warn('fb save fail', e));
        }
      } catch (e) { warn('fb save throw', e); }
    } else if (typeof window._fbSaveProd === 'function') {
      try { window._fbSaveProd(window.PROD_DATA); } catch (e) { warn('fb saveprod fail', e); }
    }
  }

  function listenFirebaseProduccion() {
    document.addEventListener('db-update', (ev) => {
      const { key, payload } = ev.detail || {};
      if (key !== 'produccion' || !payload) return;
      try {
        window.PROD_DATA = {
          corte:    Array.isArray(payload.corte)    ? payload.corte    : [],
          armado:   Array.isArray(payload.armado)   ? payload.armado   : [],
          clientes: Array.isArray(payload.clientes) ? payload.clientes : [],
          rpt:      Array.isArray(payload.rpt)      ? payload.rpt      : [],
        };
        if (State.activeTab) renderActiveTab();
      } catch (e) { warn('parse payload fail', e); }
    });
  }

  // CAMBIO #4: Semana lunes-sábado (en lugar de martes-martes)
  function getProdSemanaLS() {
    if (State.semMode === 'range' && State.semDesde && State.semHasta) {
      const desdeISO = State.semDesde, hastaISO = State.semHasta;
      const desde = prodFromISO(desdeISO), hasta = prodFromISO(hastaISO);
      const fil = arr => arr.filter(r => {
        const iso = prodToISO(r.fecha);
        return iso >= desdeISO && iso <= hastaISO;
      });
      return {
        corte:    fil(window.PROD_DATA.corte),
        armado:   fil(window.PROD_DATA.armado),
        clientes: fil(window.PROD_DATA.clientes),
        rpt:      fil(window.PROD_DATA.rpt || []),
        desde, hasta, desdeISO, hastaISO, custom: true,
      };
    }
    const now = new Date();
    const day = now.getDay();
    const diff = day === 0 ? 6 : (day - 1);
    const lun = new Date(now); lun.setDate(now.getDate() - diff);
    const sab = new Date(lun); sab.setDate(lun.getDate() + 5);
    const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const desdeISO = fmt(lun), hastaISO = fmt(sab);
    const desde = prodFromISO(desdeISO), hasta = prodFromISO(hastaISO);
    const fil = arr => arr.filter(r => {
      const iso = prodToISO(r.fecha);
      return iso >= desdeISO && iso <= hastaISO;
    });
    return {
      corte:    fil(window.PROD_DATA.corte),
      armado:   fil(window.PROD_DATA.armado),
      clientes: fil(window.PROD_DATA.clientes),
      rpt:      fil(window.PROD_DATA.rpt || []),
      desde, hasta, desdeISO, hastaISO, custom: false,
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // 4. HELPERS DE RENDER (badges, stages)
  // ═══════════════════════════════════════════════════════════════════
  const ETAPAS = ['corte', 'cinta', 'perforacion', 'armado', 'empaque'];
  const ETAPA_LABELS = {
    corte: 'CORTE', cinta: 'CINTA', perforacion: 'PERFORACIÓN',
    armado: 'ARMADO', empaque: 'EMPAQUE',
  };

  // 3 estados: 'done' (X verde), 'pend' (P amarillo), null/'' (vacío)
  function getEtapaState(estados, etapa) {
    if (!estados) return null;
    const v = estados[etapa];
    if (v === 'done' || v === true || v === 'X' || v === 'x') return 'done';
    if (v === 'pend' || v === 'pendiente' || v === 'PENDIENTE' || v === 'P') return 'pend';
    return null;
  }
  function nextEtapaState(curr) {
    // ciclo: vacío → done → pend → vacío
    if (!curr) return 'done';
    if (curr === 'done') return 'pend';
    return null;
  }
  function stageMark(state) {
    if (state === 'done') return 'X';
    if (state === 'pend') return 'P';
    return '';
  }
  function stageTitle(state) {
    if (state === 'done') return 'COMPLETADO';
    if (state === 'pend') return 'PENDIENTE';
    return 'No marcado';
  }
  function stageClass(state) {
    if (state === 'done') return 's-done';
    if (state === 'pend') return 's-pend';
    return '';
  }

  function ciudadBadge(ciudad) {
    const map = { 'San Pedro Sula': 'pp2-badge-sps', 'Tegucigalpa': 'pp2-badge-tgu', 'Cortés': 'pp2-badge-crt' };
    return `<span class="pp2-badge ${map[ciudad] || 'pp2-badge-sps'}">${escapeHTML(ciudad || '—')}</span>`;
  }
  function estadoBadge(estado) {
    const cls = estado === 'Completado' ? 'pp2-badge-ok' : estado === 'Pendiente' ? 'pp2-badge-stop' : 'pp2-badge-proc';
    return `<span class="pp2-badge ${cls}">${escapeHTML(estado || '—')}</span>`;
  }
  function estatusBadge(estatus) {
    const cls = estatus === 'TERMINADO' ? 'pp2-badge-ok' : estatus === 'PENDIENTE' ? 'pp2-badge-stop' : 'pp2-badge-proc';
    return `<span class="pp2-badge ${cls}">${escapeHTML(estatus || '—')}</span>`;
  }
  function maqBadge(m) {
    return `<span class="pp2-badge pp2-badge-maq">${escapeHTML(m || '—')}</span>`;
  }

  function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

  // ═══════════════════════════════════════════════════════════════════
  // 5. DETECCIÓN DEL MÓDULO Y SUS TABS
  // ═══════════════════════════════════════════════════════════════════

  // Encuentra el header "PRODUCCIÓN" del módulo (visible)
  function findProduccionHeader() {
    const headers = document.querySelectorAll('h1, h2, h3');
    for (const h of headers) {
      if (h.closest && h.closest('[id^="pp2-"]')) continue;
      const txt = (h.textContent || '').trim().toUpperCase();
      if (txt === 'PRODUCCIÓN' || txt === 'PRODUCCION') {
        const r = h.getBoundingClientRect();
        if (r.width > 0 && r.height > 0) return h;
      }
    }
    return null;
  }

  // Encuentra los botones de tabs del módulo Producción
  // (basado en imagen 1: "Resumen", "Corte (33)", "Armado (38)", "Clientes en taller (13)",
  //  "Clientes en proceso (13)", "Semana actual", "Reporte láminas (8)")
  function findProduccionTabs() {
    const header = findProduccionHeader();
    if (!header) return null;
    // Buscar el contenedor común del módulo (subir hasta padre que contenga las tabs)
    let container = header.parentElement;
    let depth = 0;
    while (container && depth < 8) {
      // Cualquier elemento que tenga al menos 2 hijos texto que sean nombres de tabs
      const candidates = container.querySelectorAll('button, a, [role="tab"], div, span');
      const tabs = {};
      for (const el of candidates) {
        if (el.closest('[id^="pp2-"]')) continue;
        const txt = (el.textContent || '').trim();
        if (!txt) continue;
        // Match exacto o con (N) al final
        const stripped = txt.replace(/\s*\(\d+\)\s*$/, '').trim();
        const lower = stripped.toLowerCase();
        // Solo elementos clickables visibles
        const r = el.getBoundingClientRect();
        if (r.width === 0 || r.height === 0) continue;
        // Solo elementos pequeños (no contenedores grandes)
        if (r.height > 80) continue;
        if (lower === 'resumen' && !tabs.resumen) tabs.resumen = el;
        else if (lower === 'corte' && !tabs.corte) tabs.corte = el;
        else if (lower === 'armado' && !tabs.armado) tabs.armado = el;
        else if (lower === 'clientes en taller' && !tabs.taller) tabs.taller = el;
        else if (lower === 'clientes en proceso' && !tabs.proceso) tabs.proceso = el;
        else if (lower === 'semana actual' && !tabs.semana) tabs.semana = el;
        else if ((lower === 'reporte láminas' || lower === 'reporte laminas' || lower === 'reporte producción' || lower === 'reporte produccion') && !tabs.reporte) tabs.reporte = el;
      }
      if (tabs.resumen && tabs.corte && tabs.armado) {
        return { container, tabs };
      }
      container = container.parentElement;
      depth++;
    }
    return null;
  }

  // Encuentra el panel donde React renderiza el contenido de la tab activa.
  // Estrategia: el contenedor que viene DESPUÉS del bloque de tabs y es hermano cercano.
  function findContentPanel(tabsInfo) {
    if (!tabsInfo || !tabsInfo.container) return null;
    // El contenido suele estar como hermano siguiente del contenedor de tabs
    // Buscamos el primer hijo grande (>100px alto) después de las tabs
    const tabsContainer = tabsInfo.tabs.resumen.closest('div');
    if (!tabsContainer) return tabsInfo.container;
    let sibling = tabsContainer.nextElementSibling;
    while (sibling) {
      const r = sibling.getBoundingClientRect();
      if (r.height > 80) return sibling;
      sibling = sibling.nextElementSibling;
    }
    // Fallback: el contenedor padre
    return tabsInfo.container;
  }

  // ═══════════════════════════════════════════════════════════════════
  // 6. RENOMBRAR TAB "Reporte láminas" → "Reporte Producción"
  // ═══════════════════════════════════════════════════════════════════
  // Requisito: encontrar el botón con texto "Reporte láminas" o variantes y cambiar el texto
  // sin romper React. Usamos un MutationObserver localizado para mantener el rename.
  function renombrarTabReporte(tabsInfo) {
    if (!tabsInfo || !tabsInfo.tabs.reporte) return;
    const el = tabsInfo.tabs.reporte;
    // Buscar el nodo de texto exacto que contiene "Reporte láminas"
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
    let node;
    while ((node = walker.nextNode())) {
      const txt = (node.nodeValue || '').trim();
      if (/^Reporte\s+l[áa]minas\b/i.test(txt)) {
        const newTxt = node.nodeValue.replace(/Reporte\s+l[áa]minas/i, 'Reporte Producción');
        if (node.nodeValue !== newTxt) {
          node.nodeValue = newTxt;
        }
      }
    }
  }

    }
    const desde = State.repDesde, hasta = State.repHasta;
    const fil = arr => arr.filter(r => {
      const iso = prodToISO(r.fecha);

      if (hasta && iso > hasta) return false;
      return true;
    });
    return { corte: fil(D.corte), armado: fil(D.armado), clientes: fil(D.clientes), rpt: fil(D.rpt || []) };

  function drawChartTurnoMaquina() {
    const canvas = document.getElementById('pp2-chart-tm');
    if (!canvas || typeof Chart === 'undefined') return;
    const D = window.PROD_DATA;
    const tmData = {};
    (D.corte || []).forEach(r => {
      const m = (r.maquina || '').toUpperCase();
      const lam = parseFloat(r.laminas) || 0;
      let maquina = 'OTRA';
      let turno = '?';
      if (m.includes('GIBBEN')) maquina = 'GIBBEN';
      else if (m.includes('GABBIANNI') || m.includes('GABBIANI')) maquina = 'GABBIANNI';
      else {
        const parts = m.replace(/MAQUINA\s+/i, '').split(/\s*-\s*/);
        maquina = (parts[0] || 'OTRA').trim();
      }
      const tmatch = m.match(/T([A-Z])\b/);
      if (tmatch) turno = 'T' + tmatch[1];
      if (!tmData[maquina]) tmData[maquina] = {};
      tmData[maquina][turno] = (tmData[maquina][turno] || 0) + lam;
    });

    const maquinas = Object.keys(tmData);
    const turnosSet = new Set();
    maquinas.forEach(m => Object.keys(tmData[m]).forEach(t => turnosSet.add(t)));
    const turnos = [...turnosSet].sort();
    const palette = ['#0d9488', '#0891b2', '#b8860b', '#d97706', '#7c3aed'];
    const datasets = turnos.map((t, i) => ({
      label: 'Turno ' + t.replace(/^T/, ''),
      data: maquinas.map(m => tmData[m][t] || 0),
      backgroundColor: palette[i % palette.length],
      borderRadius: 6,
      borderSkipped: false,
    }));

    if (State.chartTurnoMaquina) State.chartTurnoMaquina.destroy();
    State.chartTurnoMaquina = new Chart(canvas, {
      type: 'bar',
      data: { labels: maquinas, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { color: '#57534e', font: { size: 11, weight: '700' } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y} láminas` } },
        },
        scales: {
          x: { ticks: { color: '#57534e', font: { weight: '700' } }, grid: { color: '#e7e5e4' } },
          y: { beginAtZero: true, ticks: { color: '#57534e' }, grid: { color: '#e7e5e4' }, title: { display: true, text: 'Láminas', color: '#78716c', font: { size: 10 } } },
        },
      },
    });
  }

  function removeChartCard() {
    const card = document.getElementById('pp2-chart-tm-card');
    if (card) card.remove();
    if (State.chartTurnoMaquina) {
      State.chartTurnoMaquina.destroy();
      State.chartTurnoMaquina = null;
    }
  }

        const et = cell.getAttribute('data-pp2-mt');
        _modalEstados[et] = nextEtapaState(_modalEstados[et]);

      const act = ev.target.closest('[data-pp2-action]');
      if (!act) return;

  function applyChecklistUI() {
    document.querySelectorAll('#pp2-mcl-checklist .pp2-check-cell').forEach(cell => {
      const et = cell.getAttribute('data-pp2-mt');
      const st = _modalEstados[et];
      cell.classList.remove('s-done', 's-pend');
      if (st === 'done') cell.classList.add('s-done');
      else if (st === 'pend') cell.classList.add('s-pend');
      const mark = cell.querySelector('.pp2-check-cell-mark');
      const status = cell.querySelector('.pp2-check-cell-status');
      if (mark) mark.textContent = stageMark(st) || '·';
      if (status) status.textContent = stageTitle(st);
    });
  }

  function saveCliente() {
    const fecha = document.getElementById('pp2-mcl-fecha').value;
    const cliente = document.getElementById('pp2-mcl-cliente').value.trim();
    if (!fecha || !cliente) { toast('⚠ Ingresa fecha y cliente', 'warn'); return; }
    const obj = {
      fecha: prodFromISO(fecha),
      cliente,
      area: document.getElementById('pp2-mcl-area').value.trim(),
      obs: document.getElementById('pp2-mcl-obs').value.trim(),
      estados: { ..._modalEstados },
    };
    const D = window.PROD_DATA;
    if (!D.clientes) D.clientes = [];
    if (State.editClienteIdx >= 0) {
      // Preservar campos que el bundle de React pueda usar
      D.clientes[State.editClienteIdx] = { ...D.clientes[State.editClienteIdx], ...obj };
      toast('✓ Cliente actualizado', 'ok');
    } else {
      D.clientes.push(obj);
      D.clientes.sort((a, b) => prodToISO(a.fecha).localeCompare(prodToISO(b.fecha)));
      toast('✓ Cliente agregado', 'ok');
    }
    saveData();
    closeModal();
    renderActiveTab();
  }

  function eliminarCliente(idx) {
    if (!confirm('¿Eliminar este cliente?')) return;
    if (!window.PROD_DATA.clientes) return;
    window.PROD_DATA.clientes.splice(idx, 1);
    saveData();
    renderActiveTab();
    toast('✓ Eliminado', 'ok');
  }

  // ═══════════════════════════════════════════════════════════════════
  // 13. CONTROL: MOSTRAR / OCULTAR HOST DE TAB INTERCEPTADA
  // ═══════════════════════════════════════════════════════════════════
  // Para no luchar con React, ponemos un div HOST encima del panel de contenido
  // de la tab interceptada con position:absolute y mismo bounding box.
  function getOrCreateHost() {
    let host = document.getElementById('pp2-host');
    if (host) return host;
    host = document.createElement('div');
    host.id = 'pp2-host';
    host.style.cssText = 'position:absolute;background:#faf8f5;z-index:10;display:none;overflow-y:auto;border-radius:8px;';
    document.body.appendChild(host);
    // Eventos delegados
    host.addEventListener('click', (ev) => {
      const t = ev.target;
      // Toggle en celda de etapa
      const cell = t.closest('[data-pp2-toggle]');
      if (cell) {
        const idx = parseInt(cell.getAttribute('data-pp2-toggle'), 10);
        const et = cell.getAttribute('data-pp2-etapa');
        const D = window.PROD_DATA;
        if (D.clientes && D.clientes[idx]) {
          const r = D.clientes[idx];
          if (!r.estados) r.estados = {};
          r.estados[et] = nextEtapaState(getEtapaState(r.estados, et));
          saveData();
          renderActiveTab();
        }
        return;
      }
      // Modos
      const sm = t.closest('[data-pp2-semmode]');
      if (sm) {
        State.semMode = sm.getAttribute('data-pp2-semmode');
        if (State.semMode === 'current') { State.semDesde = ''; State.semHasta = ''; }
        renderActiveTab();
        return;
      }
      const rm = t.closest('[data-pp2-repmode]');
      if (rm) {
        State.repMode = rm.getAttribute('data-pp2-repmode');
        if (State.repMode === 'all') { State.repDesde = ''; State.repHasta = ''; }
        renderActiveTab();
        return;
      }
      // Acciones
      const act = t.closest('[data-pp2-action]');
      if (act) {
        const a = act.getAttribute('data-pp2-action');
        if (a === 'add-cliente')  abrirNuevo();
        if (a === 'edit-cliente') abrirEditar(parseInt(act.getAttribute('data-pp2-idx'), 10));
        if (a === 'del-cliente')  eliminarCliente(parseInt(act.getAttribute('data-pp2-idx'), 10));
        if (a === 'pdf-cliente')  exportarPDFCliente();
        if (a === 'pdf-semana')   exportarPDFSemana();
        if (a === 'pdf-reporte')  exportarPDFReporte();
        if (a === 'clear-sem')    { State.semDesde = ''; State.semHasta = ''; renderActiveTab(); }
        if (a === 'clear-rep')    { State.repDesde = ''; State.repHasta = ''; renderActiveTab(); }
        return;
      }
    });
    host.addEventListener('change', (ev) => {
      const t = ev.target;
      if (t.id === 'pp2-sem-desde') { State.semDesde = t.value; renderActiveTab(); }
      if (t.id === 'pp2-sem-hasta') { State.semHasta = t.value; renderActiveTab(); }
      if (t.id === 'pp2-rep-desde') { State.repDesde = t.value; renderActiveTab(); }
      if (t.id === 'pp2-rep-hasta') { State.repHasta = t.value; renderActiveTab(); }
    });
    return host;
  }

  function positionHostOver(target) {
    const host = getOrCreateHost();
    const r = target.getBoundingClientRect();
    const sy = window.scrollY, sx = window.scrollX;
    host.style.top    = (r.top + sy) + 'px';
    host.style.left   = (r.left + sx) + 'px';
    host.style.width  = r.width + 'px';
    // Alto mínimo para que se vea bien
    host.style.minHeight = Math.max(r.height, 400) + 'px';
    host.style.display = 'block';
  }

  function showHostOnPanel(panel, renderFn) {
    if (!panel) return;
    const host = getOrCreateHost();
    positionHostOver(panel);
    renderFn(host);
  }

  function hideHost() {
    const host = document.getElementById('pp2-host');
    if (host) host.style.display = 'none';
  }

  // Mantener posición sincronizada al scroll/resize
  function attachHostSync() {
    const reposition = () => {
      const host = document.getElementById('pp2-host');
      if (!host || host.style.display === 'none') return;
      const tabsInfo = findProduccionTabs();
      if (!tabsInfo) { hideHost(); return; }
      const panel = findContentPanel(tabsInfo);
      if (!panel) { hideHost(); return; }
      positionHostOver(panel);
    };
    window.addEventListener('scroll', reposition, true);
    window.addEventListener('resize', reposition);
  }

  // ═══════════════════════════════════════════════════════════════════
  // 14. RENDER GLOBAL POR TAB ACTIVA
  // ═══════════════════════════════════════════════════════════════════
  function renderActiveTab() {
    const tabsInfo = findProduccionTabs();
    if (!tabsInfo) return;
    const panel = findContentPanel(tabsInfo);
    if (!panel) return;
    const host = getOrCreateHost();

    if (State.activeTab === 'proceso')  { showHostOnPanel(panel, renderClientesEnProceso); removeChartCard(); }
    else if (State.activeTab === 'semana')   { showHostOnPanel(panel, renderSemana); removeChartCard(); }
    else if (State.activeTab === 'reporte')  { showHostOnPanel(panel, renderReporte); removeChartCard(); }
    else if (State.activeTab === 'resumen')  {
      // En Resumen: dejamos visible el de React y agregamos el chart NUEVO debajo
      hideHost();
      ensureChartCardInResumen(panel);
    }
    else { hideHost(); removeChartCard(); }
  }

  // ═══════════════════════════════════════════════════════════════════
  // 15. INTERCEPTOR DE TABS
  // ═══════════════════════════════════════════════════════════════════
  function bindTabIntercept(tabsInfo) {
    if (!tabsInfo) return;
    const T = tabsInfo.tabs;

    const wireTab = (el, key) => {
      if (!el || el.__pp2Wired) return;
      el.__pp2Wired = true;
      // No usamos preventDefault porque queremos que React también marque la tab como activa visualmente.
      // En la fase de capture, decidimos qué hacer DESPUÉS de que React responda.
      el.addEventListener('click', () => {
        State.activeTab = key;
        // Pequeño delay para que React renderice su panel y podamos posicionar encima
        setTimeout(renderActiveTab, 50);
        setTimeout(renderActiveTab, 200);
        setTimeout(renderActiveTab, 500);
      });
    };

    wireTab(T.resumen, 'resumen');
    wireTab(T.corte, 'corte');
    wireTab(T.armado, 'armado');
    wireTab(T.taller, 'taller');
    wireTab(T.proceso, 'proceso');
    wireTab(T.semana, 'semana');
    wireTab(T.reporte, 'reporte');
  }

  // ═══════════════════════════════════════════════════════════════════
  // 16. WATCHER PRINCIPAL
  // ═══════════════════════════════════════════════════════════════════
  let _wTimer = null;
  function startWatcher() {
    const tick = () => {
      const tabsInfo = findProduccionTabs();
      if (!tabsInfo) {
        if (State.moduleVisible) {
          State.moduleVisible = false;
          State.activeTab = null;
          hideHost();
          removeChartCard();
        }
        return;
      }
      State.moduleVisible = true;
      renombrarTabReporte(tabsInfo);
      bindTabIntercept(tabsInfo);
      // Si tenemos una tab interceptada activa, mantén el host posicionado
      if (State.activeTab) {
        renderActiveTab();
      }
    };

    const obs = new MutationObserver(() => {
      clearTimeout(_wTimer);
      _wTimer = setTimeout(tick, 100);
    });
    obs.observe(document.body, { childList: true, subtree: true, characterData: true });

    // Ticks iniciales
    setTimeout(tick, 600);
    setTimeout(tick, 1500);
    setTimeout(tick, 3000);
  }

  // ═══════════════════════════════════════════════════════════════════
  // 17. INICIALIZACIÓN
  // ═══════════════════════════════════════════════════════════════════
  function init() {
    injectStyles();
    listenFirebaseProduccion();
    startWatcher();
    attachHostSync();

    // Tag fijo para indicar que el patch está activo
    if (!document.getElementById('pp2-tag')) {
      const tag = document.createElement('div');
      tag.id = 'pp2-tag';
      tag.className = 'pp2-tag';
      tag.textContent = 'Producción Patch v2.0';
      document.body.appendChild(tag);
    }

    log('v2.0 cargado · esperando navegación a Producción');

    // Debug
    window.__pp2 = {
      State,
      data: () => window.PROD_DATA,
      tabs: () => findProduccionTabs(),
      panel: () => { const t = findProduccionTabs(); return t ? findContentPanel(t) : null; },
      forceTab: (key) => { State.activeTab = key; renderActiveTab(); },
      version: '2.0.0',
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
