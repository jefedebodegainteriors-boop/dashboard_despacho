  function prodToISO(f)   { if(!f) return ''; const p = String(f).split('/'); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : f; }
  function prodFromISO(f) { if(!f) return ''; const p = String(f).split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : f; }
  function prodDisp(f)    { if(!f) return '—'; const p = String(f).split('/'); return p.length===3 ? `${p[0]}/${p[1]}/${p[2].slice(2)}` : f; }
  function todayISO()     { return new Date().toISOString().split('T')[0]; }
  function escapeHTML(s)  { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function saveData() {
    try { localStorage.setItem('prod_v1', JSON.stringify(window.PROD_DATA)); }
    catch (e) { warn('localStorage save fail', e); }
    if (typeof window._fbSave === 'function') {
      try {
        const result = window._fbSave('produccion', window.PROD_DATA);
        if (result && typeof result.catch === 'function') result.catch(e => warn('fb save fail', e));
      } catch (e) { warn('fb save throw', e); }
    } else if (typeof window._fbSaveProd === 'function') {
      try { window._fbSaveProd(window.PROD_DATA); } catch (e) { warn('fb saveprod fail', e); }
    }
  }

  function listenFirebaseProduccion() {
    document.addEventListener('db-update', (ev) => {
      const { key, payload } = ev.detail || {};
      if (key !== 'produccion' || !payload) return;
      try {
        window.PROD_DATA = {
          corte:           Array.isArray(payload.corte)           ? payload.corte           : [],
          armado:          Array.isArray(payload.armado)          ? payload.armado          : [],
          clientes:        Array.isArray(payload.clientes)        ? payload.clientes        : [],
          clientes_taller: Array.isArray(payload.clientes_taller) ? payload.clientes_taller : [],
          rpt:             Array.isArray(payload.rpt)             ? payload.rpt             : [],

  }

  // CAMBIO #4: Semana lunes-sábado
  function getProdSemanaLS() {
    if (State.semMode === 'range' && State.semDesde && State.semHasta) {
      const desdeISO = State.semDesde, hastaISO = State.semHasta;
      const desde = prodFromISO(desdeISO), hasta = prodFromISO(hastaISO);
      const fil = arr => (arr || []).filter(r => {
        const iso = prodToISO(r.fecha);
        return iso >= desdeISO && iso <= hastaISO;
      });
      return {
        corte:           fil(window.PROD_DATA.corte),
        armado:          fil(window.PROD_DATA.armado),
        clientes:        fil(window.PROD_DATA.clientes),
        clientes_taller: fil(window.PROD_DATA.clientes_taller),
        rpt:             fil(window.PROD_DATA.rpt),
        desde, hasta, desdeISO, hastaISO, custom: true,
      };
    }
    const now = new Date();
    const day = now.getDay();
    const diff = day === 0 ? 6 : (day - 1);
    const lun = new Date(now); lun.setDate(now.getDate() - diff);
    const sab = new Date(lun); sab.setDate(lun.getDate() + 5);
    const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const desdeISO = fmt(lun), hastaISO = fmt(sab);
    const desde = prodFromISO(desdeISO), hasta = prodFromISO(hastaISO);
    const fil = arr => (arr || []).filter(r => {
      const iso = prodToISO(r.fecha);
      return iso >= desdeISO && iso <= hastaISO;
    });
    return {
      corte:           fil(window.PROD_DATA.corte),
      armado:          fil(window.PROD_DATA.armado),
      clientes:        fil(window.PROD_DATA.clientes),
      clientes_taller: fil(window.PROD_DATA.clientes_taller),
      rpt:             fil(window.PROD_DATA.rpt),
      desde, hasta, desdeISO, hastaISO, custom: false,
    };
  }

        position: fixed; bottom: 8px; right: 8px;
        background: rgba(15, 118, 110, 0.85); color: #fff;

        font-family: ui-monospace, monospace; letter-spacing: .5px;

      /* Body lock cuando el host está abierto */

  // ═══════════════════════════════════════════════════════════════════
  // 5. HELPERS DE RENDER
  // ═══════════════════════════════════════════════════════════════════
  function ciudadBadge(ciudad) {
    const map = { 'San Pedro Sula': 'pp3-badge-sps', 'Tegucigalpa': 'pp3-badge-tgu', 'Cortés': 'pp3-badge-crt' };
    return `<span class="pp3-badge ${map[ciudad] || 'pp3-badge-sps'}">${escapeHTML(ciudad || '—')}</span>`;
  }
  function estadoBadge(estado) {
    const cls = estado === 'Completado' ? 'pp3-badge-ok' : estado === 'Pendiente' ? 'pp3-badge-stop' : 'pp3-badge-proc';
    return `<span class="pp3-badge ${cls}">${escapeHTML(estado || '—')}</span>`;
  }
  function estatusBadge(estatus) {
    const cls = estatus === 'TERMINADO' ? 'pp3-badge-ok' : estatus === 'PENDIENTE' ? 'pp3-badge-stop' : 'pp3-badge-proc';
    return `<span class="pp3-badge ${cls}">${escapeHTML(estatus || '—')}</span>`;
  }
  function maqBadge(m) { return `<span class="pp3-badge pp3-badge-maq">${escapeHTML(m || '—')}</span>`; }

  function checkRowHTML(estados, idx, editable) {
    return ETAPAS.map(et => {
      const st = getEtapaState(estados, et);
      const cls = stageClass(st);
      const ro = editable ? '' : 'readonly';
      const tg = editable ? `data-pp3-toggle="${idx}" data-pp3-etapa="${et}"` : '';
      return `<td style="text-align:center;">
        <div class="pp3-stage-cell ${cls} ${ro}" ${tg} title="${ETAPA_LABELS[et]}: ${stageTitle(st)}${editable ? ' (clic para cambiar)' : ''}">${stageMark(st) || '·'}</div>
      </td>`;
    }).join('');
  }

  // === Exponer parcialmente para que las partes B y C puedan usarlo ===
  window.__pp3 = window.__pp3 || {};
  Object.assign(window.__pp3, {
    State, ETAPAS, ETAPA_LABELS,
    prodToISO, prodFromISO, prodDisp, todayISO, escapeHTML,
    saveData, listenFirebaseProduccion, getProdSemanaLS, toast,
    getEtapaState, nextEtapaState, stageMark, stageTitle, stageClass,
    injectStyles,
    ciudadBadge, estadoBadge, estatusBadge, maqBadge, checkRowHTML,
  });
})();

<script>
(() => {
  'use strict';
  const PP = window.__pp3;
  if (!PP) { console.error('[Produccion-Patch v3] Falta parte A'); return; }
  const { State, ETAPAS, ETAPA_LABELS,
    prodToISO, prodFromISO, prodDisp, escapeHTML,
    ciudadBadge, estatusBadge, maqBadge, checkRowHTML, getEtapaState, stageMark, stageTitle, stageClass } = PP;

  // ═══════════════════════════════════════════════════════════════════
  // VIEW: RESUMEN
  // ═══════════════════════════════════════════════════════════════════
  function renderResumen(panel) {
    const D = window.PROD_DATA;
    const sem = PP.getProdSemanaLS();
    const semTotal = sem.corte.length + sem.armado.length + sem.clientes.length + sem.clientes_taller.length + sem.rpt.length;

    // Láminas por tamaño
    const lamPor = { '4x8': 0, '7x8': 0, '9x7': 0 };
    let lamTotal = 0;
    (D.rpt || []).forEach(r => {
      const cant = parseFloat(r.cantidad_lam) || 0;
      const med = r.medida_lam || '';
      if (lamPor[med] !== undefined) lamPor[med] += cant;
      lamTotal += cant;
    });

    // Armadores
    const arm = {};
    (D.armado || []).forEach(r => {
      const a = (r.armador || '').trim();
      if (a) arm[a] = (arm[a] || 0) + 1;
    });
    const armEntries = Object.entries(arm).sort((a,b) => b[1]-a[1]);
    const armMax = armEntries.length ? armEntries[0][1] : 1;

    panel.innerHTML = `
      <div class="pp3-header">
        <div class="pp3-header-left">
          <div class="pp3-header-bar"></div>
          <div>
            <h1>RESUMEN — PRODUCCIÓN</h1>
            <div class="pp3-subtitle">VISTA GENERAL · CORTE · ARMADO · CLIENTES</div>
          </div>
        </div>
      </div>

      <div class="pp3-kpi-row">
        <div class="pp3-kpi k1"><div class="pp3-kpi-lbl">⚙️ Cortes Totales</div><div class="pp3-kpi-val">${(D.corte||[]).length}</div><div class="pp3-kpi-sub">Registros históricos</div></div>
        <div class="pp3-kpi k2"><div class="pp3-kpi-lbl">🔨 Armados Totales</div><div class="pp3-kpi-val">${(D.armado||[]).length}</div><div class="pp3-kpi-sub">Registros históricos</div></div>
        <div class="pp3-kpi k3"><div class="pp3-kpi-lbl">👷 Clientes Proceso</div><div class="pp3-kpi-val">${(D.clientes||[]).length}</div><div class="pp3-kpi-sub">Con etapas</div></div>
        <div class="pp3-kpi k4"><div class="pp3-kpi-lbl">📅 Esta Semana</div><div class="pp3-kpi-val">${semTotal}</div><div class="pp3-kpi-sub">Lunes a sábado</div></div>
      </div>

      <div class="pp3-charts-grid">
        <div class="pp3-card">
          <div class="pp3-card-title">📐 LÁMINAS CORTADAS POR TAMAÑO</div>
          <div class="pp3-lam-grid" style="margin-top:12px;">
            <div class="pp3-lam-cell l1"><div class="pp3-lam-num">${lamPor['4x8']}</div><div class="pp3-lam-lbl">4×8</div></div>
            <div class="pp3-lam-cell l2"><div class="pp3-lam-num">${lamPor['7x8']}</div><div class="pp3-lam-lbl">7×8</div></div>
            <div class="pp3-lam-cell l3"><div class="pp3-lam-num">${lamPor['9x7']}</div><div class="pp3-lam-lbl">9×7</div></div>
          </div>
          <div class="pp3-lam-total">
            <span class="pp3-lam-total-lbl">TOTAL LÁMINAS</span>
            <span class="pp3-lam-total-num">${lamTotal}</span>
          </div>
        </div>

        <div class="pp3-card">
          <div class="pp3-card-title t-armado">🔨 OPERARIOS DE ARMADO</div>
          <div class="pp3-arm-list" style="margin-top:12px;">
            ${!armEntries.length
              ? '<div style="color:#a8a29e;font-size:11px;text-align:center;padding:20px 0;">Sin registros de armado</div>'
              : armEntries.map(([nombre, count]) => {
                  const pct = armMax > 0 ? Math.round((count / armMax) * 100) : 0;
                  return `<div class="pp3-arm-item">
                    <span class="pp3-arm-name">${escapeHTML(nombre)}</span>
                    <div class="pp3-arm-bar"><div class="pp3-arm-fill" style="width:${pct}%;"></div></div>
                    <span class="pp3-arm-num">${count}</span>
                  </div>`;
                }).join('')}
          </div>
          <div class="pp3-lam-total">
            <span class="pp3-lam-total-lbl">TOTAL ARMADORES</span>
            <span class="pp3-lam-total-num">${armEntries.length}</span>
          </div>
        </div>
      </div>

      <!-- CAMBIO #2: GRÁFICO NUEVO -->
      <div class="pp3-card" style="margin-bottom:14px;">
        <div class="pp3-card-title">📊 LÁMINAS CORTADAS · POR MÁQUINA Y TURNO</div>
        <div class="pp3-card-sub">Comparativo agrupado · suma de láminas registradas en Corte</div>
        <div style="margin-top:12px;height:280px;position:relative;">
          <canvas id="pp3-chart-tm"></canvas>
        </div>
      </div>

      <div class="pp3-charts-grid">
        <div class="pp3-card">
          <div class="pp3-card-title">⚙️ CORTES POR MÁQUINA</div>
          <div style="margin-top:12px;height:240px;position:relative;"><canvas id="pp3-chart-maq"></canvas></div>
        </div>
        <div class="pp3-card">
          <div class="pp3-card-title">📈 REGISTROS POR FECHA</div>
          <div style="margin-top:12px;height:240px;position:relative;"><canvas id="pp3-chart-fecha"></canvas></div>
        </div>
      </div>
    `;

    // Charts
    setTimeout(() => drawChartsResumen(D), 50);
  }

  function drawChartsResumen(D) {
    if (typeof Chart === 'undefined') return;

    // ── Gráfico nuevo: Láminas por máquina y turno ──
    const tmData = {};
    (D.corte || []).forEach(r => {
      const m = (r.maquina || '').toUpperCase();
      const lam = parseFloat(r.laminas) || 0;
      let maquina = 'OTRA', turno = '?';
      if (m.includes('GIBBEN')) maquina = 'GIBBEN';
      else if (m.includes('GABBIANNI') || m.includes('GABBIANI')) maquina = 'GABBIANNI';
      else {
        const parts = m.replace(/MAQUINA\s+/i, '').split(/\s*-\s*/);
        maquina = (parts[0] || 'OTRA').trim();
      }
      const tmatch = m.match(/T([A-Z])\b/);
      if (tmatch) turno = 'T' + tmatch[1];
      if (!tmData[maquina]) tmData[maquina] = {};
      tmData[maquina][turno] = (tmData[maquina][turno] || 0) + lam;
    });
    const maquinas = Object.keys(tmData);
    const turnosSet = new Set();
    maquinas.forEach(m => Object.keys(tmData[m]).forEach(t => turnosSet.add(t)));
    const turnos = [...turnosSet].sort();
    const palette = ['#0d9488', '#0891b2', '#b8860b', '#d97706', '#7c3aed'];
    const datasets = turnos.map((t, i) => ({
      label: 'Turno ' + t.replace(/^T/, ''),
      data: maquinas.map(m => tmData[m][t] || 0),
      backgroundColor: palette[i % palette.length],
      borderRadius: 6, borderSkipped: false,
    }));
    const cTM = document.getElementById('pp3-chart-tm');
    if (cTM) {
      if (State.chartTurnoMaquina) { try { State.chartTurnoMaquina.destroy(); } catch(e){} }
      State.chartTurnoMaquina = new Chart(cTM, {
        type: 'bar',
        data: { labels: maquinas, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: '#57534e', font: { size: 11, weight: '700' } } },
            tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y} láminas` } },
          },
          scales: {
            x: { ticks: { color: '#57534e', font: { weight: '700' } }, grid: { color: '#e7e5e4' } },
            y: { beginAtZero: true, ticks: { color: '#57534e' }, grid: { color: '#e7e5e4' },
                 title: { display: true, text: 'Láminas', color: '#78716c', font: { size: 10 } } },
          },
        },
      });
    }

    // ── Cortes por máquina (existente) ──
    const mc = {};
    (D.corte || []).forEach(r => { mc[r.maquina] = (mc[r.maquina] || 0) + 1; });
    const cM = document.getElementById('pp3-chart-maq');
    if (cM) {
      if (State.chartMaquina) { try { State.chartMaquina.destroy(); } catch(e){} }
      State.chartMaquina = new Chart(cM, {
        type: 'bar',
        data: { labels: Object.keys(mc), datasets: [{ data: Object.values(mc),
          backgroundColor: palette, borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: '#57534e', font: { size: 10 } }, grid: { color: '#e7e5e4' } },
                    y: { beginAtZero: true, ticks: { color: '#57534e' }, grid: { color: '#e7e5e4' } } } },
      });
    }

    // ── Registros por fecha (existente) ──
    const fc = {};
    [...(D.corte||[]), ...(D.armado||[]), ...(D.clientes||[]), ...(D.clientes_taller||[])].forEach(r => {
      if (r.fecha) fc[r.fecha] = (fc[r.fecha] || 0) + 1;
    });
    const fs = Object.entries(fc).sort((a,b) => prodToISO(a[0]).localeCompare(prodToISO(b[0])));
    const cF = document.getElementById('pp3-chart-fecha');
    if (cF) {
      if (State.chartFecha) { try { State.chartFecha.destroy(); } catch(e){} }
      State.chartFecha = new Chart(cF, {
        type: 'line',
        data: { labels: fs.map(e => prodDisp(e[0])), datasets: [{ data: fs.map(e => e[1]),
          borderColor: '#0d9488', backgroundColor: 'rgba(13,148,136,.1)',
          pointBackgroundColor: '#0d9488', pointRadius: 4, tension: .3, fill: true }] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: '#57534e', font: { size: 9 }, maxRotation: 45 }, grid: { color: '#e7e5e4' } },
                    y: { beginAtZero: true, ticks: { color: '#57534e' }, grid: { color: '#e7e5e4' } } } },
      });
    }
  }

  function getFiltradoReporte() {
    const D = window.PROD_DATA;
    if (State.repMode === 'all') {
      return {
        corte: D.corte || [], armado: D.armado || [],
        clientes: D.clientes || [], clientes_taller: D.clientes_taller || [],
        rpt: D.rpt || [],
      };
    }
    const desde = State.repDesde, hasta = State.repHasta;
    const fil = arr => (arr || []).filter(r => {
      const iso = prodToISO(r.fecha);
      if (desde && iso < desde) return false;
      if (hasta && iso > hasta) return false;
      return true;
    });
    return {
      corte: fil(D.corte), armado: fil(D.armado),
      clientes: fil(D.clientes), clientes_taller: fil(D.clientes_taller),
      rpt: fil(D.rpt),
    };
  }

  function openModal(id) { const el = document.getElementById(id); if (el) el.classList.add('open'); }
  function closeModal(id) { const el = document.getElementById(id); if (el) el.classList.remove('open'); }
  function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v == null ? '' : v; }
  function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }

  let _modalEstados = { corte: null, cinta: null, perforacion: null, armado: null, empaque: null };

  function applyChecklistUI() {
    document.querySelectorAll('#pp3-mp-checklist .pp3-check-cell').forEach(cell => {
      const et = cell.getAttribute('data-pp3-mt');
      const st = _modalEstados[et];
      cell.classList.remove('s-done', 's-pend');
      if (st === 'done') cell.classList.add('s-done');
      else if (st === 'pend') cell.classList.add('s-pend');
      const mark = cell.querySelector('.pp3-check-cell-mark');
      const status = cell.querySelector('.pp3-check-cell-status');
      if (mark) mark.textContent = stageMark(st) || '·';
      if (status) status.textContent = stageTitle(st);
    });
  }

  function abrirNuevo(type) {
    State.editMode = { type, index: -1 };
    const today = todayISO();
    if (type === 'corte') {
      document.getElementById('pp3-mc-title').textContent = '⚙️ Nuevo Registro de Corte';
      setVal('pp3-mc-fecha', today);
      setVal('pp3-mc-maquina', 'MAQUINA GIBBEN - TC');
      setVal('pp3-mc-laminas', '');
      setVal('pp3-mc-operario', '');
      setVal('pp3-mc-obs', '');
      openModal('pp3-mod-corte');
    } else if (type === 'armado') {
      document.getElementById('pp3-ma-title').textContent = '🔨 Nuevo Registro de Armado';
      ['pp3-ma-nro','pp3-ma-cantidad','pp3-ma-descripcion','pp3-ma-medida','pp3-ma-area','pp3-ma-cliente','pp3-ma-color','pp3-ma-armador','pp3-ma-tiempo'].forEach(id => setVal(id, ''));
      setVal('pp3-ma-fecha', today);
      setVal('pp3-ma-localidad', 'SPS');
      setVal('pp3-ma-estatus', 'TERMINADO');
      openModal('pp3-mod-armado');
    } else if (type === 'taller') {
      document.getElementById('pp3-mt-title').textContent = '👷 Nuevo Cliente en Taller';
      setVal('pp3-mt-fecha', today);
      setVal('pp3-mt-cliente', '');
      setVal('pp3-mt-obs', '');
      openModal('pp3-mod-taller');
    } else if (type === 'proceso') {
      document.getElementById('pp3-mp-title').textContent = '✅ Nuevo Cliente en Proceso';
      setVal('pp3-mp-fecha', today);
      setVal('pp3-mp-cliente', '');
      setVal('pp3-mp-area', '');
      setVal('pp3-mp-obs', '');
      _modalEstados = { corte: null, cinta: null, perforacion: null, armado: null, empaque: null };
      applyChecklistUI();
      openModal('pp3-mod-proceso');
    }
  }

  function abrirEditar(type, idx) {
    State.editMode = { type, index: idx };
    if (type === 'corte') {
      const r = window.PROD_DATA.corte[idx]; if (!r) return;
      document.getElementById('pp3-mc-title').textContent = '⚙️ Editar Registro de Corte';
      setVal('pp3-mc-fecha', prodToISO(r.fecha));
      setVal('pp3-mc-maquina', r.maquina || 'MAQUINA GIBBEN - TC');
      setVal('pp3-mc-laminas', r.laminas || '');
      setVal('pp3-mc-operario', r.operario || '');
      setVal('pp3-mc-obs', r.obs || '');
      openModal('pp3-mod-corte');
    } else if (type === 'armado') {
      const r = window.PROD_DATA.armado[idx]; if (!r) return;
      document.getElementById('pp3-ma-title').textContent = '🔨 Editar Registro de Armado';
      setVal('pp3-ma-nro', r.nro || '');
      setVal('pp3-ma-cantidad', r.cantidad || '');
      setVal('pp3-ma-descripcion', r.descripcion || '');

      setVal('pp3-ma-area', r.area || '');
      setVal('pp3-ma-cliente', r.cliente || '');
      setVal('pp3-ma-color', r.color || '');
      setVal('pp3-ma-localidad', r.localidad || 'SPS');

      setVal('pp3-mp-area', r.area || '');

      _modalEstados = {
        corte: getEtapaState(r.estados, 'corte'),
        cinta: getEtapaState(r.estados, 'cinta'),
        perforacion: getEtapaState(r.estados, 'perforacion'),

  function guardar(type) {
    if (type === 'corte') {
      const fecha = getVal('pp3-mc-fecha');
      if (!fecha) { toast('⚠ Ingresa la fecha', 'warn'); return; }
      const obj = {
        fecha: prodFromISO(fecha),
        maquina: getVal('pp3-mc-maquina'),
        laminas: getVal('pp3-mc-laminas').trim(),
        operario: getVal('pp3-mc-operario').trim(),
        obs: getVal('pp3-mc-obs').trim(),
      };
      const D = window.PROD_DATA;
      if (State.editMode.index >= 0 && State.editMode.type === 'corte') {
        D.corte[State.editMode.index] = obj;
        toast('✓ Corte actualizado', 'ok');
      } else {
        D.corte.push(obj);
        D.corte.sort((a,b) => prodToISO(a.fecha).localeCompare(prodToISO(b.fecha)));
        toast('✓ Corte agregado', 'ok');
      }
      saveData(); closeModal('pp3-mod-corte'); renderActiveView();
    } else if (type === 'armado') {
      const fecha = getVal('pp3-ma-fecha');
      if (!fecha) { toast('⚠ Ingresa la fecha', 'warn'); return; }
      const obj = {
        nro: getVal('pp3-ma-nro').trim(),
        cantidad: getVal('pp3-ma-cantidad').trim(),
        descripcion: getVal('pp3-ma-descripcion').trim(),
        medida: getVal('pp3-ma-medida').trim(),
        area: getVal('pp3-ma-area').trim(),
        cliente: getVal('pp3-ma-cliente').trim(),
        color: getVal('pp3-ma-color').trim(),
        localidad: getVal('pp3-ma-localidad'),
        armador: getVal('pp3-ma-armador').trim(),
        fecha: prodFromISO(fecha),
        tiempo: getVal('pp3-ma-tiempo').trim(),
        estatus: getVal('pp3-ma-estatus'),
      };
      const D = window.PROD_DATA;
      if (State.editMode.index >= 0 && State.editMode.type === 'armado') {
        D.armado[State.editMode.index] = obj;
        toast('✓ Armado actualizado', 'ok');
      } else {
        D.armado.push(obj);
        D.armado.sort((a,b) => prodToISO(a.fecha).localeCompare(prodToISO(b.fecha)));
        toast('✓ Armado agregado', 'ok');
      }
      saveData(); closeModal('pp3-mod-armado'); renderActiveView();
    } else if (type === 'taller') {
      const fecha = getVal('pp3-mt-fecha');
      const cliente = getVal('pp3-mt-cliente').trim();
      if (!fecha || !cliente) { toast('⚠ Ingresa fecha y cliente', 'warn'); return; }
      const obj = { fecha: prodFromISO(fecha), cliente, obs: getVal('pp3-mt-obs').trim() };
      const D = window.PROD_DATA;
      if (!D.clientes_taller) D.clientes_taller = [];
      if (State.editMode.index >= 0 && State.editMode.type === 'taller') {
        D.clientes_taller[State.editMode.index] = obj;
        toast('✓ Cliente actualizado', 'ok');
      } else {
        D.clientes_taller.push(obj);
        D.clientes_taller.sort((a,b) => prodToISO(a.fecha).localeCompare(prodToISO(b.fecha)));
        toast('✓ Cliente agregado', 'ok');
      }
      saveData(); closeModal('pp3-mod-taller'); renderActiveView();
    } else if (type === 'proceso') {
      const fecha = getVal('pp3-mp-fecha');
      const cliente = getVal('pp3-mp-cliente').trim();
      if (!fecha || !cliente) { toast('⚠ Ingresa fecha y cliente', 'warn'); return; }
      const obj = {
        fecha: prodFromISO(fecha), cliente,
        area: getVal('pp3-mp-area').trim(),
        obs: getVal('pp3-mp-obs').trim(),
        estados: { ..._modalEstados },
      };
      const D = window.PROD_DATA;
      if (!D.clientes) D.clientes = [];
      if (State.editMode.index >= 0 && State.editMode.type === 'proceso') {
        D.clientes[State.editMode.index] = { ...D.clientes[State.editMode.index], ...obj };
        toast('✓ Cliente actualizado', 'ok');
      } else {
        D.clientes.push(obj);
        D.clientes.sort((a,b) => prodToISO(a.fecha).localeCompare(prodToISO(b.fecha)));
        toast('✓ Cliente agregado', 'ok');
      }
      saveData(); closeModal('pp3-mod-proceso'); renderActiveView();
    }
  }

  function eliminar(type, idx) {
    if (!confirm('¿Eliminar este registro?')) return;
    const map = { corte: 'corte', armado: 'armado', taller: 'clientes_taller', proceso: 'clientes' };
    const key = map[type];
    if (!window.PROD_DATA[key]) return;
    window.PROD_DATA[key].splice(idx, 1);
    saveData(); renderActiveView();
    toast('✓ Eliminado', 'ok');
  }

  function pdfWindow(title, body) {
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
      <style>
        body{font-family:Arial,sans-serif;padding:24px;color:#1c1917;background:#fff;}
        h1{font-size:20px;color:#0f766e;margin-bottom:4px;}

        .hcl{background:#ffedd5;color:#9a3412;}.hr{background:#fef3c7;color:#854d0e;}
        p.sub{color:#78716c;font-size:11px;margin-bottom:20px;}
        table{width:100%;border-collapse:collapse;font-size:11px;}
        th{background:#0f766e;color:#fff;padding:8px;text-align:left;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
        td{padding:7px 8px;border-bottom:1px solid #e7e5e4;vertical-align:top;}

        .footer{margin-top:24px;font-size:10px;color:#a8a29e;text-align:right;border-top:1px solid #e7e5e4;padding-top:8px;}
      </style></head><body>${body}
      <script>window.onload=()=>setTimeout(()=>window.print(),250);<\/script>
      </body></html>`);
    w.document.close();
  }

    if (!corte.length && !armado.length && !clientes.length && !clientes_taller.length && !rpt.length) {
      toast('Sin datos en el período', 'warn'); return;
    }
    const f = new Date().toLocaleDateString('es-HN', { day: '2-digit', month: 'long', year: 'numeric' });
    const titulo = sem.custom ? '🏭 Producción — Rango Personalizado' : '🏭 Producción — Semana Actual (Lun-Sáb)';
    const mk = (e, et) => {
      const st = getEtapaState(e, et);
      if (st === 'done') return '<span style="color:#0d9488;font-weight:800;">X</span>';
      if (st === 'pend') return '<span style="color:#d97706;font-weight:800;font-size:10px;background:#fef3c7;padding:1px 5px;border-radius:3px;">PEND</span>';
      return '<span style="color:#d6d3d1;">·</span>';
    };
    let body = `<h1>${titulo}</h1><p class="sub">${prodDisp(desde)} → ${prodDisp(hasta)} · Generado: ${f}</p>`;
    if (corte.length) body += `<h2 class="hc">⚙️ Corte (${corte.length})</h2><table><thead><tr><th>#</th><th>FECHA</th><th>MÁQUINA</th><th>LÁM.</th><th>OPERARIO</th><th>OBS.</th></tr></thead><tbody>${corte.map((r,i)=>`<tr><td>${i+1}</td><td>${prodDisp(r.fecha)}</td><td>${escapeHTML(r.maquina||'')}</td><td style="text-align:center;font-weight:700;">${escapeHTML(r.laminas||'—')}</td><td>${escapeHTML(r.operario||'—')}</td><td>${escapeHTML(r.obs||'—')}</td></tr>`).join('')}</tbody></table>`;
    if (armado.length) body += `<h2 class="ha">🔨 Armado (${armado.length})</h2><table><thead><tr><th>N°</th><th>CANT</th><th>DESCR.</th><th>ÁREA</th><th>CLIENTE</th><th>ARMADOR</th><th>FECHA</th><th>TIEMPO</th><th>ESTATUS</th></tr></thead><tbody>${armado.map((r,i)=>`<tr><td>${escapeHTML(r.nro||(i+1))}</td><td>${escapeHTML(r.cantidad||'—')}</td><td>${escapeHTML(r.descripcion||'—')}</td><td>${escapeHTML(r.area||'—')}</td><td><strong>${escapeHTML(r.cliente||'—')}</strong></td><td>${escapeHTML(r.armador||'—')}</td><td>${prodDisp(r.fecha)}</td><td>${escapeHTML(r.tiempo||'—')}</td><td><strong>${escapeHTML(r.estatus||'—')}</strong></td></tr>`).join('')}</tbody></table>`;

    if (rpt.length) body += `<h2 class="hr">📋 Reporte de Producción (${rpt.length})</h2><table><thead><tr><th>#</th><th>FECHA</th><th>CLIENTE</th><th>ÁREA</th><th>OPERADOR</th><th>CIUDAD</th><th>CANT.</th><th>MEDIDA</th><th>ESTADO</th></tr></thead><tbody>${rpt.map((r,i)=>`<tr><td>${i+1}</td><td>${prodDisp(r.fecha)}</td><td><strong>${escapeHTML(r.cliente||'—')}</strong></td><td>${escapeHTML(r.area||'—')}</td><td>${escapeHTML(r.operador||'—')}</td><td>${escapeHTML(r.ciudad||'—')}</td><td style="text-align:center;font-weight:700;">${escapeHTML(r.cantidad_lam||'—')}</td><td>${escapeHTML(r.medida_lam||'—')}</td><td><strong>${escapeHTML(r.estado||'—')}</strong></td></tr>`).join('')}</tbody></table>`;
    body += `<div class="footer">Panel de Control — Producción · ${prodDisp(desde)} → ${prodDisp(hasta)}</div>`;

  const VIEWS = [
    { key: 'resumen',  label: 'Resumen',           icon: '📊', group: 'VISTAS',   countKey: null },

  function buildSidebarHTML() {
    const D = window.PROD_DATA;
    const grouped = { 'VISTAS': [], 'GESTIÓN': [], 'REPORTES': [] };
    VIEWS.forEach(v => grouped[v.group].push(v));

    const renderItem = v => {
      const count = v.countKey ? (D[v.countKey] || []).length : null;
      const active = State.activeView === v.key ? 'active' : '';
      return `<button class="pp3-sb-item ${active}" data-pp3-view="${v.key}">
        <span class="pp3-sb-icon">${v.icon}</span>
        <span>${v.label}</span>
        ${count != null ? `<span class="pp3-sb-count">${count}</span>` : ''}
      </button>`;
    };

    const renderGroup = (title, items) => `
      <div class="pp3-sb-group">
        <div class="pp3-sb-group-title">PRODUCCIÓN · ${title}</div>
        ${items.map(renderItem).join('')}
      </div>
    `;

    return `
      <div class="pp3-sb-brand">
        <div class="pp3-sb-brand-logo">In</div>
        <div>
          <div class="pp3-sb-brand-text-1">Interiorshn</div>

  function renderActiveView() {
    const sidebar = document.getElementById('pp3-sidebar');
    const panel = document.getElementById('pp3-panel');
    if (!sidebar || !panel) return;
    sidebar.innerHTML = buildSidebarHTML();
    if (State.activeView === 'resumen')      renderResumen(panel);
    else if (State.activeView === 'corte')   renderCorte(panel);
    else if (State.activeView === 'armado')  renderArmado(panel);
    else if (State.activeView === 'taller')  renderTaller(panel);
    else if (State.activeView === 'proceso') renderProceso(panel);
    else if (State.activeView === 'semana')  renderSemana(panel);
    else if (State.activeView === 'reporte') renderReporte(panel);
  }

  // ═══════════════════════════════════════════════════════════════════
  // EVENTOS
  // ═══════════════════════════════════════════════════════════════════
  function attachEvents(host) {
    if (host.__pp3Wired) return;
    host.__pp3Wired = true;

    host.addEventListener('click', (ev) => {
      const t = ev.target;

      // Cambio de vista (sidebar)
      const v = t.closest('[data-pp3-view]');
      if (v) {
        State.activeView = v.getAttribute('data-pp3-view');
        renderActiveView();
        return;
      }

      // Toggle de etapa en tabla (Clientes en proceso)
      const cell = t.closest('[data-pp3-toggle]');
      if (cell) {
        const idx = parseInt(cell.getAttribute('data-pp3-toggle'), 10);
        const et = cell.getAttribute('data-pp3-etapa');
        const r = window.PROD_DATA.clientes[idx];
        if (r) {
          if (!r.estados) r.estados = {};
          r.estados[et] = nextEtapaState(getEtapaState(r.estados, et));
          saveData();
          renderActiveView();
        }
        return;
      }

      // Modos
      const sm = t.closest('[data-pp3-semmode]');
      if (sm) {
        State.semMode = sm.getAttribute('data-pp3-semmode');
        if (State.semMode === 'current') { State.semDesde = ''; State.semHasta = ''; }
        renderActiveView();
        return;
      }
      const rm = t.closest('[data-pp3-repmode]');
      if (rm) {
        State.repMode = rm.getAttribute('data-pp3-repmode');
        if (State.repMode === 'all') { State.repDesde = ''; State.repHasta = ''; }
        renderActiveView();
        return;
      }

      // Acciones
      const a = t.closest('[data-pp3-act]');
      if (a) {
        const act = a.getAttribute('data-pp3-act');
        const idx = parseInt(a.getAttribute('data-pp3-idx'), 10);
        if (act === 'back')           hideHost();
        else if (act === 'add-corte')   abrirNuevo('corte');
        else if (act === 'add-armado')  abrirNuevo('armado');
        else if (act === 'add-taller')  abrirNuevo('taller');
        else if (act === 'add-proceso') abrirNuevo('proceso');
        else if (act === 'edit-corte')   abrirEditar('corte', idx);
        else if (act === 'edit-armado')  abrirEditar('armado', idx);
        else if (act === 'edit-taller')  abrirEditar('taller', idx);
        else if (act === 'edit-proceso') abrirEditar('proceso', idx);
        else if (act === 'del-corte')    eliminar('corte', idx);
        else if (act === 'del-armado')   eliminar('armado', idx);
        else if (act === 'del-taller')   eliminar('taller', idx);
        else if (act === 'del-proceso')  eliminar('proceso', idx);
        else if (act === 'pdf-corte')   pdfCorte();
        else if (act === 'pdf-armado')  pdfArmado();
        else if (act === 'pdf-taller')  pdfTaller();
        else if (act === 'pdf-proceso') pdfProceso();
        else if (act === 'pdf-semana')  pdfSemana();
        else if (act === 'pdf-reporte') pdfReporte();
        else if (act === 'clear-sem')   { State.semDesde = ''; State.semHasta = ''; renderActiveView(); }
        else if (act === 'clear-rep')   { State.repDesde = ''; State.repHasta = ''; renderActiveView(); }
        return;
      }

      // Cerrar modal
      const c = t.closest('[data-pp3-close]');
      if (c) { closeModal(c.getAttribute('data-pp3-close')); return; }
      const cls = t.closest('.pp3-modal-close');
      if (cls) { const ov = cls.closest('.pp3-overlay'); if (ov) ov.classList.remove('open'); return; }

      // Guardar modal
      const sv = t.closest('[data-pp3-save]');
      if (sv) { guardar(sv.getAttribute('data-pp3-save')); return; }

      // Toggle checklist en modal
      const mc = t.closest('[data-pp3-mt]');
      if (mc) {
        const et = mc.getAttribute('data-pp3-mt');
        _modalEstados[et] = nextEtapaState(_modalEstados[et]);
        applyChecklistUI();
        return;
      }

      // Cerrar al click fuera del modal
      if (t.classList && t.classList.contains('pp3-overlay')) {
        t.classList.remove('open');
      }
    });

    host.addEventListener('input', (ev) => {
      const t = ev.target;
      if (t.id === 'pp3-arm-q')      { State.armFiltCliente = t.value; renderActiveView(); }
      if (t.id === 'pp3-sem-desde')  { State.semDesde = t.value; renderActiveView(); }
      if (t.id === 'pp3-sem-hasta')  { State.semHasta = t.value; renderActiveView(); }
      if (t.id === 'pp3-rep-desde')  { State.repDesde = t.value; renderActiveView(); }
      if (t.id === 'pp3-rep-hasta')  { State.repHasta = t.value; renderActiveView(); }
    });
    host.addEventListener('change', (ev) => {
      if (ev.target.id === 'pp3-arm-est') { State.armFiltEstatus = ev.target.value; renderActiveView(); }
    });
  }

  // ═══════════════════════════════════════════════════════════════════
  // HOST: MOSTRAR / OCULTAR
  // ═══════════════════════════════════════════════════════════════════
  function buildHost() {
    let host = document.getElementById('pp3-host');
    if (host) return host;
    host = document.createElement('div');
    host.id = 'pp3-host';
    host.innerHTML = `
      <aside id="pp3-sidebar"></aside>
      <main id="pp3-panel"></main>
    `;
    document.body.appendChild(host);

    // Modales en otro contenedor (para que estén siempre disponibles)
    let modals = document.getElementById('pp3-modals');
    if (!modals) {
      modals = document.createElement('div');
      modals.id = 'pp3-modals';
      modals.innerHTML = buildModalsHTML();
      document.body.appendChild(modals);
    }

    attachEvents(host);
    attachEvents(modals);
    return host;
  }

  function showHost() {
    const host = buildHost();
    host.classList.add('open');
    document.body.classList.add('pp3-locked');
    State.moduleVisible = true;
    if (!State.activeView) State.activeView = 'resumen';
    renderActiveView();
  }

  function hideHost() {
    const host = document.getElementById('pp3-host');
    if (host) host.classList.remove('open');
    document.body.classList.remove('pp3-locked');
    State.moduleVisible = false;
  }

  // ═══════════════════════════════════════════════════════════════════
  // INTERCEPTOR: detectar cuando React abre el módulo Producción
  // ═══════════════════════════════════════════════════════════════════
  function isProduccionOpenInReact() {
    // Estrategia 1: header h1/h2 con texto exacto "PRODUCCIÓN"
    const headers = document.querySelectorAll('h1, h2, h3');
    for (const h of headers) {
      if (h.closest && h.closest('#pp3-host')) continue;
      const txt = (h.textContent || '').trim().toUpperCase();
      if (txt === 'PRODUCCIÓN' || txt === 'PRODUCCION' || txt === '🏭 PRODUCCIÓN') {
        const r = h.getBoundingClientRect();
        if (r.width > 0 && r.height > 0) return h;
      }
    }
    // Estrategia 2: detectar tabs típicas del módulo (Resumen + Corte + Armado visibles)
    const buttons = [...document.querySelectorAll('button, [role="tab"]')];
    let hasResumen = false, hasCorte = false, hasArmado = false;
    for (const b of buttons) {
      if (b.closest && b.closest('#pp3-host')) continue;
      const txt = (b.textContent || '').trim().toLowerCase();
      const stripped = txt.replace(/\s*\(\d+\)\s*$/, '').trim();
      const r = b.getBoundingClientRect();
      if (r.width === 0 || r.height === 0) continue;
      if (r.height > 80) continue;
      if (stripped === 'resumen') hasResumen = true;
      if (stripped === 'corte') hasCorte = true;
      if (stripped === 'armado') hasArmado = true;
    }
    if (hasResumen && hasCorte && hasArmado) return true;
    return null;
  }

  let _navTimer = null;
  function startWatcher() {
    const tick = () => {
      const found = isProduccionOpenInReact();
      if (found && !State.moduleVisible) {
        showHost();
      } else if (!found && State.moduleVisible) {
        hideHost();
      }
    };
    const obs = new MutationObserver(() => {
      clearTimeout(_navTimer);
      _navTimer = setTimeout(tick, 80);
    });
    obs.observe(document.body, { childList: true, subtree: true, characterData: true });
    setTimeout(tick, 600);
    setTimeout(tick, 1500);
    setTimeout(tick, 3000);
  }

  // ═══════════════════════════════════════════════════════════════════
  // INICIALIZACIÓN
  // ═══════════════════════════════════════════════════════════════════
  function init() {
    injectStyles();
    listenFirebaseProduccion();
    startWatcher();

    if (!document.getElementById('pp3-tag')) {
      const tag = document.createElement('div');
      tag.id = 'pp3-tag';
      tag.className = 'pp3-tag';
      tag.textContent = 'Producción Patch v3.0';
      document.body.appendChild(tag);
    }

    State.inited = true;
    console.log('[Produccion-Patch v3] v3.0 cargado · esperando navegación a Producción');

    Object.assign(window.__pp3, {
      show: showHost, hide: hideHost,
      forceView: (key) => { State.activeView = key; if (!State.moduleVisible) showHost(); else renderActiveView(); },
      data: () => window.PROD_DATA,
      version: '3.0.0',
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
